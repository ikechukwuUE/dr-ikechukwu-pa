<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DR. IKECHUKWU PA{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    {% block extra_css %}{% endblock %}
    <style>
        /* Immediate dark theme application to prevent flash */
        html { background: #0a0a0f; }
    </style>
</head>
<body class="dark-theme">
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar glass">
        <div class="nav-container">
            <div class="nav-logo" data-glow>
                <div class="logo-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="logo-text">
                    <span class="logo-main">DR. IKECHUKWU</span>
                    <span class="logo-sub">PA System</span>
                </div>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link" data-glow>
                    <i class="fas fa-home"></i>
                   <span>Home</span>
                </a>
                <a href="/clinical" class="nav-link" data-glow>
                    <i class="fas fa-stethoscope"></i>
                    <span>Clinical</span>
                </a>
                <a href="/finance" class="nav-link" data-glow>
                    <i class="fas fa-chart-line"></i>
                    <span>Finance</span>
                </a>
                <a href="/ai" class="nav-link" data-glow>
                    <i class="fas fa-code"></i>
                    <span>AI Dev</span>
                </a>
                <a href="/fashion" class="nav-link" data-glow>
                    <i class="fas fa-palette"></i>
                    <span>Fashion</span>
                </a>
            </div>
            <div class="nav-status">
                <div class="status-indicator" data-glow>
                    <span class="pulse-dot"></span>
                    <span class="status-text">System Online</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer glass">
        <div class="footer-content">
            <div class="footer-brand">
                <i class="fas fa-robot"></i>
                <span>DR. IKECHUKWU PA</span>
            </div>
            <p class="footer-tagline">🤖 Enterprise AI Assistant | Phase 2.0</p>
            <div class="footer-tech">
                <span class="tech-badge"><i class="fab fa-python"></i> Flask</span>
                <span class="tech-badge"><i class="fas fa-brain"></i> Gemini AI</span>
                <span class="tech-badge"><i class="fas fa-shield-alt"></i> HITL Security</span>
            </div>
        </div>
    </footer>

    <!-- Global Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
    
    <script>
        // Add glow effects on hover
        document.querySelectorAll('[data-glow]').forEach(el => {
            el.addEventListener('mouseenter', (e) => {
                const glow = document.createElement('div');
                glow.className = 'glow-effect';
                glow.style.left = e.pageX + 'px';
                glow.style.top = e.pageY + 'px';
                document.body.appendChild(glow);
                setTimeout(() => glow.remove(), 500);
            });
        });

        // Smooth page transitions
        document.body.style.opacity = '0';
        window.addEventListener('load', () => {
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '1';
        });
    </script>
</body>
</html>
